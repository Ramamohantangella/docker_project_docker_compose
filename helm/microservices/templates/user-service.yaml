apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservices.fullname" . }}-user-service
  namespace: {{ .Values.namespace | default "microservices" }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
    app: user-service
spec:
  replicas: {{ .Values.userService.replicaCount }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: "{{ .Values.userService.image.repository }}:{{ .Values.userService.image.tag }}"
        imagePullPolicy: {{ .Values.userService.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.userService.port }}
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SPRING_DATASOURCE_PASSWORD
        resources:
          {{- toYaml .Values.userService.resources | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /users
            port: {{ .Values.userService.port }}
          initialDelaySeconds: 40
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /users
            port: {{ .Values.userService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Values.namespace | default "microservices" }}
spec:
  selector:
    app: user-service
  ports:
  - port: {{ .Values.userService.port }}
    targetPort: {{ .Values.userService.port }}
  type: ClusterIP
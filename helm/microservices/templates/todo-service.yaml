apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservices.fullname" . }}-todo-service
  namespace: {{ .Values.namespace | default "microservices" }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
    app: todo-service
spec:
  replicas: {{ .Values.todoService.replicaCount }}
  selector:
    matchLabels:
      app: todo-service
  template:
    metadata:
      labels:
        app: todo-service
    spec:
      containers:
      - name: todo-service
        image: "{{ .Values.todoService.image.repository }}:{{ .Values.todoService.image.tag }}"
        imagePullPolicy: {{ .Values.todoService.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.todoService.port }}
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SPRING_DATASOURCE_PASSWORD
        resources:
          {{- toYaml .Values.todoService.resources | nindent 12 }}
        livenessProbe:
          httpGet:
            path: /todos
            port: {{ .Values.todoService.port }}
          initialDelaySeconds: 40
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /todos
            port: {{ .Values.todoService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: todo-service
  namespace: {{ .Values.namespace | default "microservices" }}
spec:
  selector:
    app: todo-service
  ports:
  - port: {{ .Values.todoService.port }}
    targetPort: {{ .Values.todoService.port }}
  type: ClusterIP